name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Clean cache
        run: rm -rf .next out

      - name: Build
        run: npm run build
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_NOTICE_DB_ID: a1cd5926332c486ca01678469ce3f206
          NOTION_FAQ_DB_ID: 9735aec6c5ab4cfdb11ac2af387599f4
          NOTION_NEWS_DB_ID: c826ccb460104e67931146b9a243db59

      - name: Override index.html with apex redirect
        run: |
          cat > out/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <meta http-equiv="refresh" content="0; url=/ko/">
          <script>window.location.replace('/ko/');</script>
          </head>
          <body></body>
          </html>
          HTML

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          cname: www.vworks.tech
